services:
  db:
    image: postgres:17
    environment:
      POSTGRES_DB: moodlog
      POSTGRES_USER: moodlog_user
      POSTGRES_PASSWORD: devpassword
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U moodlog_user -d moodlog"]
      interval: 5s
      retries: 5

  backend:
    build: .
    command: python manage.py runserver 0.0.0.0:8001
    volumes:
      - .:/app
    ports:
      - "8001:8001"
    environment:
      DATABASE_NAME: moodlog
      DATABASE_USER: moodlog_user
      DATABASE_PASSWORD: devpassword
      DATABASE_HOST: db
      DATABASE_PORT: 5432
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data: